              raamcosta-destination-animations    = { group = "io.github.raamcosta.compose-destinations", name = "animations-core", version.ref = "compose-dest" }
              raamcosta-destinations-ksp          = { group = "io.github.raamcosta.compose-destinations", name = "ksp",            version.ref = "compose-dest" }
              jsoup                               = { group = "org.jsoup",                   name = "jsoup",                     version.ref = "jsoup" }
              google-play-review                  = { group = "com.google.android.play",     name = "review-ktx",                version.ref = "play-review" }
              timber                              = { group = "com.jakewharton.timber",      name = "timber",                    version.ref = "timber" }
          """)

          # ── assistant-core build.gradle ───────────────────────────────────────
          w("novagram-stubs/assistant-core/build.gradle", """
              apply plugin: 'com.android.library'
              apply plugin: 'kotlin-android'
              apply plugin: 'dagger.hilt.android.plugin'
              apply plugin: 'com.google.devtools.ksp'

              android {
                  namespace 'com.appvillis.assistant_core'
                  compileSdkVersion 35
                  defaultConfig { minSdkVersion 24 }
                  compileOptions {
                      sourceCompatibility JavaVersion.VERSION_17
                      targetCompatibility JavaVersion.VERSION_17
                  }
                  kotlinOptions { jvmTarget = '17' }
                  buildFeatures { buildConfig false }
              }
              dependencies {
                  implementation 'com.google.dagger:hilt-android:2.57.2'
                  ksp 'com.google.dagger:hilt-compiler:2.57.2'
                  implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
                  implementation 'com.jakewharton.timber:timber:5.0.1'
                  implementation 'androidx.fragment:fragment-ktx:1.8.3'
                  implementation 'com.google.android.play:review-ktx:2.0.1'
              }
          """)

          src = "novagram-stubs/assistant-core/src/main/java"

          w(f"{src}/com/appvillis/assistant_core/app/AppInit.kt", """
              package com.appvillis.assistant_core.app
              import timber.log.Timber
              import javax.inject.Inject
