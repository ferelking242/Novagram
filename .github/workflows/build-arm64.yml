name: NovaGram ARM64 Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ARM64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and build tools
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;21.4.7075529" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmake;3.10.2.4988404" 2>/dev/null | grep -v "^\[=" || true

      - name: Generate release keystore
        run: |
          rm -f TMessagesProj/config/release.keystore
          keytool -genkey -v \
            -keystore TMessagesProj/config/release.keystore \
            -alias novagram \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass novagram123 \
            -keypass novagram123 \
            -dname "CN=NovaGram, OU=Dev, O=NovaGram, L=Paris, ST=IDF, C=FR" \
            -storetype JKS 2>/dev/null
          echo "Keystore generated"

      - name: Create local.properties and gradle.properties
        run: |
          cat > local.properties << 'EOF'
          sdk.dir=/usr/local/lib/android/sdk
          ndk.dir=/usr/local/lib/android/sdk/ndk/21.4.7075529
          githubPackagesUser=novagram
          githubPackagesToken=${{ secrets.GITHUB_TOKEN }}
          googleMapsApiKey=
          APP_CENTER_HASH_PRIVATE=
          APP_CENTER_HASH_PUBLIC=
          APP_CENTER_HASH_HARDCORE=
          BETA_PRIVATE_URL=
          BETA_PUBLIC_URL=
          BETA_HARDCORE_URL=
          RELEASE_STORE_PASSWORD=novagram123
          RELEASE_KEY_ALIAS=novagram
          RELEASE_KEY_PASSWORD=novagram123
          EOF
          sed -i 's/^[ \t]*//' local.properties
          cat local.properties
          cat > gradle.properties << 'GPEOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          android.useAndroidX=true
          android.enableJetifier=false
          kotlin.code.style=official
          android.nonTransitiveRClass=false
          GPEOF
          sed -i 's/^[ \t]*//' gradle.properties
          echo "=== gradle.properties ==="
          cat gradle.properties

      - name: Create novagram-stubs
        shell: python3 {0}
        run: |
          import os, textwrap

          def w(path, content):
              os.makedirs(os.path.dirname(path) if os.path.dirname(path) else '.', exist_ok=True)
              with open(path, 'w') as f:
                  f.write(textwrap.dedent(content).lstrip('\n'))

          # ── settings.gradle ───────────────────────────────────────────────────
          w("novagram-stubs/settings.gradle", """
              rootProject.name = 'novagram-stubs'
              include ':assistant-core'
              include ':features:account-export'
              include ':features:user-activities'
              include ':features:ai-chat-analysis'
              include ':features:rep-user'
              include ':features:nicegram-billing'
              include ':core:network'
              include ':core:markets'
          """)

          # ── gradle.properties for composite build ────────────────────────────
          w("novagram-stubs/gradle.properties", """
              android.useAndroidX=true
              android.enableJetifier=false
              org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          """)

          # ── root build.gradle — composite build needs its own classpath ───────
