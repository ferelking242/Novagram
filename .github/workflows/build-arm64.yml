name: NovaGram ARM64 Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ARM64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and build tools
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;21.4.7075529" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmake;3.10.2.4988404" 2>/dev/null | grep -v "^\[=" || true

      - name: Generate release keystore
        run: |
          mkdir -p TMessagesProj/config
          rm -f TMessagesProj/config/release.keystore
          keytool -genkey -v \
            -keystore TMessagesProj/config/release.keystore \
            -alias nicegram \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nicegram \
            -keypass nicegram \
            -dname "CN=NovaGram, OU=Dev, O=NovaGram, L=Paris, ST=IDF, C=FR" \
            -storetype JKS 2>/dev/null
          echo "Keystore generated"

      - name: Create local.properties
        run: |
          cat > local.properties << 'EOF'
          sdk.dir=/usr/local/lib/android/sdk
          ndk.dir=/usr/local/lib/android/sdk/ndk/21.4.7075529
          googleMapsApiKey=
          APP_CENTER_HASH_PRIVATE=
          APP_CENTER_HASH_PUBLIC=
          APP_CENTER_HASH_HARDCORE=
          BETA_PRIVATE_URL=
          BETA_PUBLIC_URL=
          BETA_HARDCORE_URL=
          EOF
          sed -i 's/^[ \t]*//' local.properties
          echo "=== local.properties ==="
          cat local.properties

      - name: Build ARM64 Release APK
        run: |
          chmod +x gradlew
          ./gradlew :TMessagesProj_App:assembleAfatRelease \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=1g"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: novagram-arm64-release
          path: TMessagesProj_App/build/outputs/apk/afat/release/app.apk
          retention-days: 30
