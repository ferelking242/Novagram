      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build ARM64 Release APK
        run: |
          set -o pipefail
          ./gradlew :TMessagesProj_App:assembleAfatRelease \
            --no-daemon \
            --stacktrace \
            -PAPP_PACKAGE=app.nicegram \
            -PAPP_VERSION_NAME=10.8.0 \
            -PAPP_VERSION_CODE=30000 \
            -PRELEASE_STORE_PASSWORD=novagram123 \
            -PRELEASE_KEY_ALIAS=novagram \
            -PRELEASE_KEY_PASSWORD=novagram123 \
            2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "Gradle exit code: $BUILD_EXIT"
          exit $BUILD_EXIT

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: novagram-arm64-release
          path: '**/build/outputs/apk/**/*.apk'
          if-no-files-found: error
